version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: qr_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: qr_management
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - qr_network

  redis:
    image: redis:7-alpine
    container_name: qr_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qr_network
    command: redis-server --appendonly yes

  backend:
    build: ./backend
    container_name: qr_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: qr_management
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-change-this
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - qr_network

  frontend:
    build: ./frontend
    container_name: qr_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - qr_network

volumes:
  postgres_data:
  redis_data:

networks:
  qr_network:
    driver: bridge